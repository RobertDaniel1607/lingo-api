services:
  postgres:
    image: postgres:16-alpine
    container_name: lingo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - lingo_pgdata:/var/lib/postgresql/data

volumes:
  lingo_pgdata: